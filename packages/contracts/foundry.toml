[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["dependencies"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# Deterministic-ish build for committed ABIs; no bytecode metadata churn.
bytecode_hash = "none"
# Committed remapping (authoritative across fresh `forge soldeer install`).
remappings = ["forge-std/=dependencies/forge-std-1.9.5/src/"]

[soldeer]
remappings_generate = false

# Soldeer (forge's package manager) — deps live in ./dependencies, no git
# submodules (clean in the shared multi-agent tree). Run: forge soldeer install
[dependencies]
forge-std = "1.9.5"
