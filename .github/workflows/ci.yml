name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Builds/lint/typecheck run without secrets (runtime boot still validates).
      SKIP_ENV_VALIDATION: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        # Run per-package in fresh processes: the whole-suite run spins up many
        # pglite (WASM Postgres) instances in ONE process and exhausts the runner.
        # Isolating per package releases memory between packages.
        run: |
          set -uo pipefail
          fail=0
          for pkg in $(find packages apps -maxdepth 1 -mindepth 1 -type d | sort); do
            if find "$pkg" -name '*.test.ts' -not -path '*/node_modules/*' -print -quit | grep -q .; then
              echo "::group::test $pkg"
              bun test "$pkg" || fail=1
              echo "::endgroup::"
            fi
          done
          exit $fail

      - name: Build
        run: bun run build
