name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev, main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # Builds/lint/typecheck run without secrets (runtime boot still validates).
      SKIP_ENV_VALIDATION: "1"
      TURBO_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: turbo-${{ runner.os }}-

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        # Run per-package in fresh processes (the whole-suite run spins up many
        # pglite WASM instances in one process and exhausts the runner). Gate on
        # actual results: FAIL on real test failures or an incomplete run; TOLERATE
        # a clean "0 fail" run that still exits non-zero — that's a known bun quirk
        # where leaked pglite clients (createPgliteDb never .close()s) surface as an
        # unhandled rejection on teardown. TODO: close pglite clients in api tests
        # and drop the tolerance.
        run: |
          set -uo pipefail
          fail=0
          for pkg in $(find packages apps -maxdepth 1 -mindepth 1 -type d | sort); do
            if find "$pkg" -name '*.test.ts' -not -path '*/node_modules/*' -print -quit | grep -q .; then
              echo "::group::test $pkg"
              out=$(bun test "$pkg" 2>&1); code=$?
              echo "$out"
              echo "::endgroup::"
              if echo "$out" | grep -qE '^[[:space:]]*[1-9][0-9]* fail'; then
                echo "::error::$pkg has failing tests"; fail=1
              elif ! echo "$out" | grep -q 'Ran [0-9]'; then
                echo "::error::$pkg test run did not complete (crash/OOM)"; fail=1
              elif [ "$code" -ne 0 ]; then
                echo "::warning::$pkg exited $code with 0 failures — tolerated pglite teardown quirk"
              fi
            fi
          done
          exit $fail

      - name: Build
        run: bun run build
